name: ci-pipeline.yml
on:
  - pull_request
  - workflow_dispatch

jobs:
  unit-test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Download repo code
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'
      - run: java --version

      - name: Set up MinGW
        if: ${{ matrix.os == 'windows-latest' }}
        uses: egor-tensin/setup-mingw@v3
        with:
          platform: x64

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: run Linux tests cases
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: | 
          chmod +x ./gradlew
          ./gradlew linuxTest

      - name: run Win tests cases
        if: ${{ matrix.os == 'windows-latest' }}
        run: ./gradlew winTest